<!doctype html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}DIA — Dam Intelligence Agent{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.0/dist/cdn.min.js"></script>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <link rel="stylesheet" href="/static/css/app.css" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#0ea5e9", dark: "#0369a1" },
            danger: "#ef4444",
            warn: "#f59e0b",
            ok: "#22c55e",
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="flex min-h-screen">
    <aside class="w-56 shrink-0 border-r border-slate-800 bg-slate-900 p-4">
      <div class="mb-6">
        <div class="text-lg font-bold tracking-wide text-brand">DIA</div>
        <div class="text-xs text-slate-400">Dam Intelligence Agent</div>
        <div class="mt-1 text-[10px] uppercase tracking-wider text-slate-500">Fractal Engenharia</div>
      </div>
      <nav class="space-y-1 text-sm">
        <a class="block rounded px-3 py-2 hover:bg-slate-800" href="/">Dashboard</a>
        <a class="block rounded px-3 py-2 hover:bg-slate-800" href="/dams">Barragens</a>
        <a class="block rounded px-3 py-2 hover:bg-slate-800" href="/events">Eventos</a>
        <a class="block rounded px-3 py-2 hover:bg-slate-800" href="/api/docs" target="_blank">API docs ↗</a>
      </nav>
    </aside>
    <main class="flex-1 p-6">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Toasts (HTMX feedback) -->
  <div id="dia-toasts" class="fixed bottom-4 right-4 z-50 flex max-w-sm flex-col gap-2"></div>

  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
