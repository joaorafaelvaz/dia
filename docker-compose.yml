services:
  postgres:
    image: postgres:16-alpine
    container_name: dia_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dia_db}
      POSTGRES_USER: ${POSTGRES_USER:-dia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dia_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dia} -d ${POSTGRES_DB:-dia_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dia_net

  redis:
    image: redis:7-alpine
    container_name: dia_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - dia_net

  # Single shared image — built once via the `api` service, reused by the Celery services.
  # Avoids 4 parallel apt-get installs that can OOM / rate-limit on small hosts.
  api:
    image: dia-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dia_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8080:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
      - reports_data:/app/reports
    restart: unless-stopped
    networks:
      - dia_net

  worker:
    image: dia-app:latest
    container_name: dia_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - reports_data:/app/reports
    restart: unless-stopped
    networks:
      - dia_net
    healthcheck:
      # Ping nativo do Celery — lista workers respondendo. Exit 0 se qualquer worker
      # respondeu em 10s. O Dockerfile default bate em curl http://localhost:8000/health
      # que worker não serve, por isso precisa override.
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME -t 10 > /dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 15s
      start_period: 60s
      retries: 3

  beat:
    image: dia-app:latest
    container_name: dia_beat
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    env_file: .env
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    networks:
      - dia_net
    healthcheck:
      # Beat não tem endpoint HTTP nem RPC — verificamos que o processo está vivo.
      # pgrep devolve 0 se achou algum processo celery no container.
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      retries: 3

  flower:
    image: dia-app:latest
    container_name: dia_flower
    command: celery -A app.tasks.celery_app flower --port=5555 --basic_auth=${BASIC_AUTH_USER:-admin}:${BASIC_AUTH_PASS:-admin}
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dia_net
    healthcheck:
      # Flower serve HTTP na 5555. O /healthcheck nativo dele devolve "OK"
      # sem exigir auth, justamente pra esse cenário.
      test: ["CMD", "curl", "-fs", "http://localhost:5555/healthcheck"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  reports_data:

networks:
  dia_net:
    driver: bridge
